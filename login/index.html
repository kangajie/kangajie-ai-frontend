<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk - KangAjie AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="../asset/img/logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0F0F10;
            color: #F0F0F0;
        }

        
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

       
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen bg-[#0F0F10] px-4 py-6">

    <div
        class="w-full max-w-sm p-6 md:p-8 bg-[#141415] rounded-[2rem] border border-[#2A2A2E] shadow-2xl fade-in text-center relative overflow-hidden">

        <div
            class="absolute -top-10 left-1/2 -translate-x-1/2 w-40 h-40 bg-yellow-500/10 rounded-full blur-[60px] pointer-events-none">
        </div>

        <div
            class="relative w-20 h-20 bg-gradient-to-br from-[#1A1A1C] to-[#0F0F10] rounded-2xl mx-auto flex items-center justify-center mb-6 border border-[#333] shadow-lg shadow-yellow-900/10 shrink-0">
            <i class="fa-solid fa-robot text-4xl text-yellow-500"></i>
        </div>

        <h2 class="text-2xl font-bold text-white mb-1 tracking-tight" id="page-title">Selamat Datang</h2>
        <p class="text-gray-500 text-xs mb-8 uppercase tracking-[0.2em] font-medium">KangAjie AI</p>

        <div id="msg-box"
            class="hidden mb-5 p-3 rounded-xl text-xs text-left font-bold border transition-all duration-300"></div>

        <button type="button" id="btn-google" onclick="handleGoogleLogin()"
            class="w-full bg-white hover:bg-gray-100 text-gray-800 font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-3 cursor-pointer">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12
                    c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24
                    c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039
                    l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36
                    c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571
                    c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24
                    C44,22.659,43.862,21.35,43.611,20.083z" />
            </svg>
            <span>Lanjutkan dengan Google</span>
        </button>

        <div class="flex items-center gap-3 my-6">
            <div class="flex-1 h-px bg-[#2A2A2E]"></div>
            <span class="text-[10px] text-gray-500 uppercase tracking-wider">atau</span>
            <div class="flex-1 h-px bg-[#2A2A2E]"></div>
        </div>

        <form id="auth-form" onsubmit="event.preventDefault(); handleAuth();" class="space-y-4 text-left relative z-10">
            <div>
                <label class="text-[10px] font-bold text-gray-400 ml-4 uppercase tracking-wider">Email</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-brands fa-google text-gray-500 group-focus-within:text-yellow-500 transition"></i>
                    </div>
                    <input type="email" id="email"
                        class="w-full pl-11 pr-4 py-3.5 bg-[#1A1A1C] rounded-xl border border-[#2A2A2E] text-white focus:border-yellow-500 focus:outline-none transition placeholder-gray-600 text-sm"
                        placeholder="nama@gmail.com" required>
                </div>
            </div>

            <div id="password-container">
                <div class="flex justify-between items-center ml-4 mb-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Password</label>
                    <button type="button" onclick="toggleResetMode()"
                        class="text-[10px] text-yellow-600 hover:text-yellow-400 transition cursor-pointer">Lupa
                        Password?</button>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-key text-gray-500 group-focus-within:text-yellow-500 transition"></i>
                    </div>
                    <input type="password" id="password"
                        class="w-full pl-11 pr-11 py-3.5 bg-[#1A1A1C] rounded-xl border border-[#2A2A2E] text-white focus:border-yellow-500 focus:outline-none transition placeholder-gray-600 text-sm"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePass()"
                        class="absolute right-4 top-3.5 text-gray-500 hover:text-white transition cursor-pointer flex items-center justify-center w-6 h-6"><i
                            class="fa-solid fa-eye"></i></button>
                </div>
            </div>

            <button type="submit" id="btn-submit"
                class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-black font-bold py-3.5 rounded-xl mt-4 transition-all shadow-lg shadow-yellow-500/20 active:scale-95 flex items-center justify-center gap-2 cursor-pointer">
                <span>Masuk Sekarang</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>

            <button type="button" id="btn-cancel-reset" onclick="toggleResetMode()"
                class="hidden w-full text-gray-500 hover:text-white text-xs py-2 transition mt-2">Batal</button>
        </form>

        <div id="footer-links"
            class="mt-8 pt-5 border-t border-[#2A2A2E] flex justify-between items-center text-xs font-medium">
            <button onclick="toggleMode()" id="switch-btn"
                class="text-gray-400 hover:text-yellow-500 transition cursor-pointer">Buat akun baru</button>
            <button onclick="handleGuest()"
                class="text-gray-500 hover:text-white transition border-b border-dashed border-gray-600 hover:border-white pb-0.5 cursor-pointer">Mode
                Tamu</button>
        </div>
    </div>

    <script>
       
        const SUPABASE_URL = 'https://bljmcpntnubxdyxfjpyg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VQKO_b2YYSQqhQYyht2SWA_dLK1_Bre';

        let kangAjieAuth;

        function initSupabase() {
            if (typeof window.supabase !== 'undefined') {
                kangAjieAuth = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                checkSession();
            } else {
                setTimeout(initSupabase, 100);
            }
        }

        let isRegister = false;
        let isResetMode = false;

        
        async function checkSession() {
            if (!kangAjieAuth) return;
            kangAjieAuth.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') window.location.href = '/';
            });
            try {
                const { data: { session }, error } = await kangAjieAuth.auth.getSession();
                if (session) window.location.href = '/';
            } catch (err) { console.error(err); }
        }

        
        async function handleAuth() {
            if (!kangAjieAuth) return showMsg("Sistem sedang memuat...", "err");

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');

            if (!email.endsWith('@gmail.com')) return showMsg("Wajib menggunakan email @gmail.com", "err");
            if (!isResetMode && password.length < 8) return showMsg("Password minimal 8 karakter", "err");

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses...`;

            try {
                if (isResetMode) {
                    const { data, error } = await kangAjieAuth.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/',
                    });
                    if (error) throw error;
                    showMsg("Link reset dikirim! Cek email Anda.", "success");
                    setTimeout(() => toggleResetMode(), 3000);

                } else if (isRegister) {
                    const { data, error } = await kangAjieAuth.auth.signUp({ email, password });
                    if (error) throw error;
                    showMsg("Akun dibuat! Silakan cek email/login.", "success");
                    setTimeout(() => toggleMode(), 2000);

                } else {
                    const { data, error } = await kangAjieAuth.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    showMsg("Berhasil masuk! Mengalihkan...", "success");
                    localStorage.removeItem('isGuest');
                    setTimeout(() => { window.location.href = '/'; }, 800);
                }

            } catch (err) {
                let errorMsg = err.message;
                if (err.message.includes('Invalid login credentials')) errorMsg = "Email atau password salah.";
                if (err.message.includes('rate limit')) errorMsg = "Terlalu banyak mencoba. Tunggu sebentar.";
                showMsg(errorMsg, "err");
            } finally {
                btn.disabled = false;
                updateButtonText();
            }
        }

        
        function toggleMode() {
            isRegister = !isRegister;
            isResetMode = false;
            updateUIState();
        }

        function toggleResetMode() {
            isResetMode = !isResetMode;
            isRegister = false;
            updateUIState();
        }

        function updateUIState() {
            const title = document.getElementById('page-title');
            const sw = document.getElementById('switch-btn');
            const passContainer = document.getElementById('password-container');
            const footer = document.getElementById('footer-links');
            const cancelReset = document.getElementById('btn-cancel-reset');

            document.getElementById('msg-box').classList.add('hidden');

            if (isResetMode) {
                title.textContent = "Reset Password";
                passContainer.classList.add('hidden');
                footer.classList.add('hidden');
                cancelReset.classList.remove('hidden');
            } else if (isRegister) {
                title.textContent = "Daftar Akun";
                passContainer.classList.remove('hidden');
                footer.classList.remove('hidden');
                cancelReset.classList.add('hidden');
                sw.textContent = "Sudah punya akun? Masuk";
            } else {
                title.textContent = "Selamat Datang";
                passContainer.classList.remove('hidden');
                footer.classList.remove('hidden');
                cancelReset.classList.add('hidden');
                sw.textContent = "Buat akun baru";
            }
            updateButtonText();
        }

        function updateButtonText() {
            const btn = document.getElementById('btn-submit');
            if (isResetMode) {
                btn.innerHTML = `<span>Kirim Link Reset</span> <i class="fa-solid fa-paper-plane text-xs"></i>`;
            } else if (isRegister) {
                btn.innerHTML = `<span>Daftar Sekarang</span>`;
            } else {
                btn.innerHTML = `<span>Masuk Sekarang</span> <i class="fa-solid fa-arrow-right text-xs"></i>`;
            }
        }

        function handleGuest() {
            localStorage.setItem('isGuest', 'true');
            window.location.href = '/';
        }

        async function handleGoogleLogin() {
            if (!kangAjieAuth) return showMsg("Sistem sedang memuat...", "err");
            localStorage.removeItem('isGuest');
            const { error } = await kangAjieAuth.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/' }
            });
            if (error) showMsg(error.message, "err");
        }

        function togglePass() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function showMsg(msg, type) {
            const box = document.getElementById('msg-box');
            box.innerHTML = (type === 'err' ? '<i class="fa-solid fa-circle-exclamation mr-2"></i>' : '<i class="fa-solid fa-circle-check mr-2"></i>') + msg;
            box.className = `mb-5 p-3 rounded-xl text-xs text-left font-bold border block ${type == 'err' ? 'bg-red-900/20 text-red-300 border-red-500/50' : 'bg-green-900/20 text-green-300 border-green-500/50'}`;
            box.classList.remove('hidden');
        }

        initSupabase();
    </script>
</body>

</html>
